# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on Ubuntu

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Eigen3, Armadillo, GSL)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libeigen3-dev \
          libarmadillo-dev \
          libopenblas-dev \
          liblapack-dev \
          libgsl-dev \
          gfortran \
          cmake \
          build-essential

    - name: Build & install complex_bessel
      run: |
        git clone --depth 1 https://github.com/joeydumont/complex_bessel.git
        cmake -S complex_bessel -B complex_bessel/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build complex_bessel/build --config Release -j
        sudo cmake --install complex_bessel/build

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DNGM_BUILD_TESTS=ON
        -DNGM_BESSEL_BACKEND=COMPLEX_BESSEL
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DCMAKE_PREFIX_PATH=/usr/local

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure